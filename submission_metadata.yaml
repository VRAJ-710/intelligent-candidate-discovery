methodology_summary: 
  - We built a rule-based, explainable candidate ranker for Redrob AI's Senior AI Engineer role, designed to run fully offline on CPU in under five minutes for ~100K profiles. The pipeline has four stages: load, score, reason, and export.
  - Load: JSONL profiles are flattened into skills, career history, education, platform signals, and derived fields (all_descriptions, full_text, consulting-only flag).
  - Quality: Anomaly detection flags suspicious profiles (skill inflation, date errors, title-skill mismatch) and assigns a trust_score multiplier—no candidates are removed.
  - Score: Weighted components, retrieval/ranking career text first (34%). Keywords cover search/IR, ranking/recommendation, production ML, and eval metrics (NDCG, MRR). Also: product vs consulting background, recruiter engagement, notice period/activity, assessments, YoE (5-9 ideal), location, education. Skill tags are only 4%. Final score = weighted sum * trust_score  * anomaly penalty.
  - Output: Top 100 get auto-generated reasoning; CSV is validated (unique IDs, ranks 1-100, non-increasing scores).

